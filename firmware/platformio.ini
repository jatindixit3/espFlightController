; ESP32-S3 flight controller firmware
; Board: Seeed Studio XIAO ESP32-S3 (non-Sense variant)
; Gyro:  MPU6050 (I2C)
; ESC:   AM32, bidirectional DShot300 + telemetry wire
; RX:    SBUS

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Native USB CDC is used for the MSP/configurator link and CLI - no UART adapter needed.
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=1
    -std=gnu++17
    -Wall
    -Wextra
build_unflags =
    -std=gnu++11

board_build.partitions = partitions.csv
board_build.f_cpu = 240000000L

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3
